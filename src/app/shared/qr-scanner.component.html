<section class="qr-scanner-root">
  <header class="qr-header">
    <div class="qr-header-top">
      <div>
        <h4 class="qr-title">{{ title }}</h4>
        <p class="qr-hint" *ngIf="hint">{{ hint }}</p>
      </div>
      <div class="qr-header-controls">
        <!-- Camera toggle switch -->
        <button type="button" class="btn-camera-toggle" [class.camera-on]="isCameraOn" (click)="toggleCamera()"
          [title]="isCameraOn ? 'Turn camera off' : 'Turn camera on'">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-label">{{ isCameraOn ? 'Camera On' : 'Camera Off' }}</span>
        </button>

        <!-- Switch camera button (only when camera is on and multiple cameras) -->
        <button *ngIf="isCameraOn && availableCameras.length > 1" type="button" class="btn btn-camera-selector"
          (click)="toggleCameraSelector()" title="Switch camera">
          <span class="camera-icon">📷</span>
          Switch
        </button>
      </div>
    </div>
    <div class="qr-camera-selector" *ngIf="showCameraSelector && availableCameras.length > 1">
      <label class="camera-selector-label">Select Camera:</label>
      <select class="camera-select" [value]="selectedCameraId || ''" (change)="switchCamera($any($event.target).value)">
        <option *ngFor="let camera of availableCameras" [value]="camera.deviceId">
          {{ camera.label }}
        </option>
      </select>
    </div>
  </header>

  <!-- Camera off state -->
  <div class="qr-camera-off" *ngIf="!isCameraOn">
    <span class="camera-off-icon">📷</span>
    <p>Camera is off. Toggle the switch above to start scanning.</p>
  </div>

  <!-- Camera on state -->
  <div class="qr-scanner-host" *ngIf="isCameraOn">
    <div class="qr-scanner-wrapper" *ngIf="!errorMessage">
      <video #videoElement class="qr-video" autoplay playsinline muted [class.hidden]="isInitializing"></video>

      <div class="qr-scanner-overlay" *ngIf="!isInitializing">
        <div class="qr-scanner-box"></div>
      </div>

      <div class="qr-scanner-loading" *ngIf="isInitializing">
        <div class="loading-spinner"></div>
        <p>Initializing camera...</p>
      </div>
    </div>

    <div class="qr-scanner-error" *ngIf="errorMessage">
      <p class="error-text">{{ errorMessage }}</p>
      <button type="button" class="btn btn-primary" (click)="initializeScanner()">
        Retry
      </button>
    </div>
  </div>

  <div class="qr-status" *ngIf="lastResult">
    <span class="qr-status-icon" [class.qr-status-icon--success]="hasScanSuccess">
      ✔
    </span>
    <span class="qr-status-text">Last scanned: {{ lastResult }}</span>
  </div>
</section>
